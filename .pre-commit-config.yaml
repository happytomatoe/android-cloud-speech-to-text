default_install_hook_types: [pre-commit, commit-msg]

repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending

  # Shell script linting (exclude run_e2e_test.sh — complex control flow
  # trips shellcheck's unreachable-code heuristic with false positives)
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: \.sh$
        exclude: ^run_e2e_test\.sh$

  # Local hooks: tests, E2E
  - repo: local
    hooks:
      # Reject Co-Authored-By lines in commit messages
      - id: no-co-authored-by
        name: no-co-authored-by
        entry: scripts/check-no-coauthored.sh
        language: script
        stages: [commit-msg]

      # Run all tests on push (via just test-all)
      - id: test-all
        name: test-all
        entry: bash -c 'just test-all'
        language: system
        pass_filenames: false
        stages: [push]
