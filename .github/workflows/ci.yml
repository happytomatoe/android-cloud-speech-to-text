name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-all:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Full history + tags required: build.gradle.kts calls `git describe --tags`
      # at config time, which exits 128 ("No names found") on a shallow clone.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Robolectric downloads the android-all-instrumented SDK jars (~hundreds of MB)
      # on first run. Cache them so CI never re-downloads (this was the slow cold run).
      - name: Cache Robolectric SDK jars
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/robolectric
          key: robolectric-sdk-${{ hashFiles('android/app/build.gradle.kts') }}
          restore-keys: |
            robolectric-sdk-
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --parallel
        working-directory: android
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: android/app/build/reports/tests/testDebugUnitTest
          retention-days: 7
