name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-all:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Full history + tags required: build.gradle.kts calls `git describe --tags`
      # at config time, which exits 128 ("No names found") on a shallow clone.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Robolectric downloads the android-all-instrumented SDK jars (~hundreds of MB)
      # on first run. Cache them so CI never re-downloads (this was the slow cold run).
      - name: Cache Robolectric SDK jars
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/robolectric
          key: robolectric-sdk-${{ hashFiles('android/app/build.gradle.kts') }}
          restore-keys: |
            robolectric-sdk-

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install handsets (hs)
        run: |
          gh release download v0.1.38 -R elliotgao2/handsets \
            --pattern handsets-linux-x86_64.tar.gz -D /tmp/hs-dl
          mkdir -p ~/.local/bin
          tar xzf /tmp/hs-dl/handsets-linux-x86_64.tar.gz -C ~/.local/bin --strip-components=1
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to ~/.local/bin
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install audio tooling for E2E test generation
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng ffmpeg

      # Gradle config-time `git describe`/`git rev-parse` at build.gradle.kts:7-15
      # exits 128 ("dubious ownership") on GitHub Actions. Mark the workspace as
      # a safe git directory so the Gradle daemon can read it.
      - name: Configure git safe.directory
        run: git config --global --add safe.directory '*'

      - name: Run all tests (unit + E2E)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: default
          arch: x86_64
          profile: pixel_7
          emulator-options: '-no-window -gpu swiftshader_indirect -noaudio -no-snapshot-save'
          disable-animations: true
          script: |
            git config --global --add safe.directory '*'
            just test-all
        env:
          DEEPGRAM_KEY: ${{ secrets.DEEPGRAM_KEY }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            android/app/build/reports/tests/testDebugUnitTest
            e2e_test.log
            e2e_diag.png
            e2e_diag.xml
          retention-days: 7
