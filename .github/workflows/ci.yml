name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Robolectric downloads the android-all-instrumented SDK jars (~hundreds of MB)
      # on first run. Cache them so CI never re-downloads (this was the slow cold run).
      - name: Cache Robolectric SDK jars
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/robolectric
          key: robolectric-sdk-${{ hashFiles('app/build.gradle') }}
          restore-keys: |
            robolectric-sdk-

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --parallel

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest
          retention-days: 7

      - name: Build dev debug APK
        run: ./gradlew assembleDevDebug --no-daemon --parallel --build-cache

      - name: Upload dev debug APK
        uses: actions/upload-artifact@v4
        with:
          name: voice-input-dev-debug
          path: app/build/outputs/apk/dev/debug/app-dev-debug.apk
          retention-days: 14
