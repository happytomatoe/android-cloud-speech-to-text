name: Build dev container image

# Builds the baked dev stack (see .devcontainer/Dockerfile) and pushes it to
# Docker Hub. Requires two repo secrets:
#   DOCKERHUB_USERNAME  — your Docker Hub account
#   DOCKERHUB_TOKEN     — a Docker Hub access token (with push rights)
# Add them at: repo Settings > Secrets and variables > Actions.

on:
  push:
    branches: [feat/api-key-links]
    paths:
      - '.devcontainer/Dockerfile'
      - '.github/workflows/build-devcontainer-image.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/whisper-to-input-dev:latest
