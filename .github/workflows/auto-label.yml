name: Auto Label PR

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title.toLowerCase();

            const labels = [];

            // Conventional commit prefixes → labels + semver bump labels
            const rules = [
              { pattern: /^feat[\(:]/,        label: 'enhancement', bump: 'minor' },
              { pattern: /^fix[\(:]/,         label: 'bug',         bump: 'patch' },
              { pattern: /^docs[\(:]/,        label: 'documentation', bump: null },
              { pattern: /^style[\(:]/,       label: 'style',       bump: null },
              { pattern: /^refactor[\(:]/,    label: 'refactor',    bump: null },
              { pattern: /^perf[\(:]/,        label: 'performance', bump: 'patch' },
              { pattern: /^test[\(:]/,        label: 'tests',       bump: null },
              { pattern: /^build[\(:]/,       label: 'build',       bump: null },
              { pattern: /^ci[\(:]/,          label: 'ci',          bump: null },
              { pattern: /^chore[\(:]/,       label: 'chore',       bump: null },
              { pattern: /^revert[\(:]/,      label: 'revert',      bump: 'patch' },
            ];

            let semverBump = null;

            for (const rule of rules) {
              if (rule.pattern.test(title)) {
                labels.push(rule.label);
                if (rule.bump) semverBump = rule.bump;
                break;
              }
            }

            // Check for breaking changes (feat!: or BREAKING CHANGE in body)
            const isBreaking = /!:/  .test(title) ||
                               (pr.body && /breaking.change/i.test(pr.body));
            if (isBreaking) {
              labels.push('breaking');
              semverBump = 'major';
            }

            // Add semver bump label for auto
            if (semverBump) {
              labels.push(semverBump);
            }

            // Add skip-release label if title contains [skip release] or [no release]
            if (/\[skip.release\]|\[no.release\]/i.test(title)) {
              labels.push('skip-release');
            }

            if (labels.length === 0) {
              console.log('No conventional commit prefix found, skipping');
              return;
            }

            // Remove old semver labels before adding new one
            const semverLabels = ['major', 'minor', 'patch'];
            const existingLabels = pr.labels.map(l => l.name);
            const toRemove = existingLabels.filter(l => semverLabels.includes(l));
            if (toRemove.length > 0) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: toRemove
              });
            }

            // Add new labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: labels
            });

            console.log(`✅ Added labels: ${labels.join(', ')}`);
