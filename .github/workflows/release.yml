name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run the release against (used by 'just release' via --ref)"
        required: false
        default: ""

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'skip ci')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install auto and plugins
        run: |
          npm install -g auto @auto-it/upload-assets

      - name: Compute release version
        id: version
        run: |
          BASE_TAG=$(git describe --tags --abbrev=0)
          BASE="${BASE_TAG#v}"
          SHA=$(git rev-parse --short HEAD)
          VERSION="${BASE}-SNAPSHOT-${SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --parallel --build-cache -PVERSION_NAME="${{ steps.version.outputs.version }}"
        working-directory: android

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: auto shipit --use-version "${{ steps.version.outputs.version }}" --prerelease --base-branch "${{ github.ref_name }}"
