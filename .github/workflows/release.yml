name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip-release')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install auto
        run: npm install -g auto

      - name: Calculate version bump
        id: version
        run: |
          BUMP=$(auto version --dry-run)
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "📦 Version bump: $BUMP"

      - name: Get current version
        id: current
        run: |
          VERSION_NAME=$(grep 'versionName' android/app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' android/app/build.gradle.kts | sed 's/.*= \([0-9]*\).*/\1/')
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "📌 Current: $VERSION_NAME (code: $VERSION_CODE)"

      - name: Calculate new version
        id: new
        run: |
          CURRENT="${{ steps.current.outputs.name }}"
          BUMP="${{ steps.version.outputs.bump }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            skip|none)
              echo "⏭️ No release needed"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
            *)
              echo "⚠️ Unknown bump type: $BUMP, defaulting to patch"
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_CODE=$((${{ steps.current.outputs.code }} + 1))

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "🏷️ New version: $NEW_VERSION (code: $NEW_CODE)"

      - name: Update version in build.gradle.kts
        if: steps.new.outputs.skip != 'true'
        run: |
          sed -i "s/versionName = \"${{ steps.current.outputs.name }}\"/versionName = \"${{ steps.new.outputs.version }}\"/" android/app/build.gradle.kts
          sed -i "s/versionCode = ${{ steps.current.outputs.code }}/versionCode = ${{ steps.new.outputs.code }}/" android/app/build.gradle.kts
          echo "✅ Updated build.gradle.kts"

      # NOTE: To publish signed release APKs, add a signing config to build.gradle.kts
      # and store the keystore + credentials as GitHub secrets. For now, we use the
      # debug APK (signed with debug keystore) so the artifact is actually installable.
      - name: Build APK
        if: steps.new.outputs.skip != 'true'
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Create GitHub Release
        if: steps.new.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.new.outputs.version }}"
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"

          # Create tag
          git tag "v$VERSION"
          git push origin "v$VERSION"

          # Create release with APK
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            "$APK_PATH#whisper-to-input-v$VERSION.apk"

          echo "🎉 Released v$VERSION"
