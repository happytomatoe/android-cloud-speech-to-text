name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - skip

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Get current version
        id: current
        run: |
          VERSION_NAME=$(grep 'versionName' android/app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep '^[[:space:]]*versionCode' android/app/build.gradle.kts | sed 's/.*= *\([0-9]*\).*/\1/')
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "đź“Ś Current: $VERSION_NAME (code: $VERSION_CODE)"

      - name: Calculate new version
        id: new
        run: |
          CURRENT="${{ steps.current.outputs.name }}"
          BUMP="${{ inputs.bump }}"

          if [ "$BUMP" = "skip" ]; then
            echo "âŹ­ď¸Ź Skipping release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "âš ď¸Ź Unknown bump: $BUMP, defaulting to patch"
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_CODE=$((${{ steps.current.outputs.code }} + 1))

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "đźŹ·ď¸Ź New version: $NEW_VERSION (code: $NEW_CODE)"

      - name: Update version in build.gradle.kts
        if: steps.new.outputs.skip != 'true'
        run: |
          sed -i "s/versionName = \"${{ steps.current.outputs.name }}\"/versionName = \"${{ steps.new.outputs.version }}\"/" android/app/build.gradle.kts
          sed -i "s/versionCode = ${{ steps.current.outputs.code }}/versionCode = ${{ steps.new.outputs.code }}/" android/app/build.gradle.kts
          echo "âś… Updated build.gradle.kts"

      - name: Build Release APK
        if: steps.new.outputs.skip != 'true'
        run: ./gradlew assembleRelease --no-daemon --parallel --build-cache
        working-directory: android

      - name: Create GitHub Release
        if: steps.new.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.new.outputs.version }}"
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"

          # Create tag
          git tag -f "v$VERSION"
          git push -f origin "v$VERSION"

          # Create release with APK
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            "$APK_PATH#whisper-to-input-v$VERSION.apk"

          echo "đźŽ‰ Released v$VERSION"
