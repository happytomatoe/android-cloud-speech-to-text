name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run the release against (used by 'just release' via --ref)"
        required: false
        default: ""

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'skip ci')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install auto and plugins
        run: |
          npm install -g auto @auto-it/upload-assets

      - name: Compute release version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_TAG=$(git describe --tags --abbrev=0)
          BASE="${BASE_TAG#v}"
          SHA=$(git rev-parse --short HEAD)
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            # Real release from main: let auto compute the next semver from PR labels.
            BUMP=$(auto version 2>/dev/null | tail -1)
            case "$BUMP" in major|minor|patch) ;; *) BUMP=patch ;; esac
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            case "$BUMP" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              *)     PATCH=$((PATCH+1)) ;;
            esac
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            PRERELEASE=""
          else
            # Canary/snapshot from a branch: stamp snapshot + unique commit id.
            VERSION="${BASE}-SNAPSHOT-${SHA}"
            PRERELEASE="--prerelease"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION} (prerelease: ${PRERELEASE:-none})"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --parallel --build-cache -PVERSION_NAME="${{ steps.version.outputs.version }}"
        working-directory: android

      - name: Upload APK as workflow artifact (canary)
        if: github.ref_name != 'main'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload APK as workflow artifact (release)
        if: github.ref_name == 'main'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Release (canary from branch)
        if: github.ref_name != 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Suffix with the CI run id so every run yields a fresh, visible release
          # (repo releases are immutable, so the tag must be unique per run).
          TAG="v${{ steps.version.outputs.version }}-${{ github.run_id }}"
          gh release create "$TAG" --prerelease --title "Canary $TAG" --generate-notes --target "${{ github.sha }}"

      - name: Release (from main)
        if: github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: auto shipit
